name: Bug Report
description: Report broken scripts, incorrect standards, or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which operating system are you using?
      options:
        - macOS
        - Linux
        - Windows (WSL)
    validations:
      required: true

  - type: dropdown
    id: ai-agent
    attributes:
      label: AI Agent
      description: Which AI agent were you using (if applicable)?
      options:
        - Cursor
        - GitHub Copilot
        - Claude/Aider
        - OpenAI Codex
        - Gemini CLI
        - Other
    validations:
      required: false

  - type: input
    id: standards-version
    attributes:
      label: Standards version
      description: Git tag or commit hash of the standards you are using
      placeholder: e.g. v1.0.0 or abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output
      render: shell
    validations:
      required: false
