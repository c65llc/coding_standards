name: Feature Request
description: Suggest a new language, AI agent, or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What type of feature are you requesting?
      options:
        - New language standard
        - New AI agent support
        - Script improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why would this be useful?
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false
