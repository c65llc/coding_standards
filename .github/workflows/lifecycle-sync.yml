name: Project Lifecycle Sync

# Reusable workflow for synchronizing PR events with GitHub Projects V2
# This workflow automatically moves project cards when PR status changes

on:
  workflow_call:
    inputs:
      project_id:
        description: 'GitHub Projects V2 ID (e.g., PVT_kwDOABCDEF)'
        required: true
        type: string
      status_field_id:
        description: 'Status field ID in the project (optional - will auto-detect if not provided)'
        required: false
        type: string
        default: ''
    secrets:
      gh_token:
        description: 'GitHub token with project write permissions'
        required: false

jobs:
  sync-project-status:
    name: Sync Project Status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Get PR details
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No pull request found in context');
              return;
            }
            
            // Extract issue number from PR body
            const issueMatch = pr.body?.match(/(?:Closes|Fixes|Resolves)\s+#(\d+)/i);
            const issueNumber = issueMatch ? issueMatch[1] : null;
            
            core.setOutput('number', pr.number);
            core.setOutput('state', pr.state);
            core.setOutput('draft', pr.draft);
            core.setOutput('merged', pr.merged || false);
            core.setOutput('issue_number', issueNumber || '');
            
            console.log(`PR #${pr.number} - State: ${pr.state}, Draft: ${pr.draft}, Issue: ${issueNumber || 'none'}`);
      
      - name: Determine target status
        id: status
        run: |
          PR_STATE="${{ steps.pr.outputs.state }}"
          IS_DRAFT="${{ steps.pr.outputs.draft }}"
          IS_MERGED="${{ steps.pr.outputs.merged }}"
          
          TARGET_STATUS=""
          
          if [ "$IS_MERGED" = "true" ]; then
            TARGET_STATUS="Done"
          elif [ "$PR_STATE" = "closed" ]; then
            TARGET_STATUS="Done"
          elif [ "$IS_DRAFT" = "true" ]; then
            TARGET_STATUS="In Review"
          elif [ "$PR_STATE" = "open" ]; then
            TARGET_STATUS="In Review"
          fi
          
          echo "target_status=$TARGET_STATUS" >> $GITHUB_OUTPUT
          echo "Target status: $TARGET_STATUS"
      
      - name: Update project status
        if: steps.pr.outputs.issue_number != ''
        uses: actions/github-script@v8
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          STATUS_FIELD_ID: ${{ inputs.status_field_id }}
          TARGET_STATUS: ${{ steps.status.outputs.target_status }}
          ISSUE_NUMBER: ${{ steps.pr.outputs.issue_number }}
        with:
          github-token: ${{ secrets.gh_token || secrets.GITHUB_TOKEN }}
          script: |
            const projectId = process.env.PROJECT_ID;
            const statusFieldId = process.env.STATUS_FIELD_ID;
            const targetStatus = process.env.TARGET_STATUS;
            const issueNumber = process.env.ISSUE_NUMBER;
            
            if (!targetStatus) {
              console.log('No target status determined, skipping update');
              return;
            }
            
            console.log(`Updating issue #${issueNumber} to status: ${targetStatus}`);
            
            try {
              // Get the issue node ID
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber)
              });
              
              const issueId = issue.data.node_id;
              console.log(`Issue node ID: ${issueId}`);
              
              // Find the project item
              const projectQuery = `
                query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              id
                            }
                          }
                        }
                      }
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              
              const projectData = await github.graphql(projectQuery, {
                projectId: projectId
              });
              
              // Find the project item for this issue
              const projectItem = projectData.node.items.nodes.find(
                item => item.content?.id === issueId
              );
              
              if (!projectItem) {
                console.log('Issue not found in project, skipping update');
                return;
              }
              
              console.log(`Project item ID: ${projectItem.id}`);
              
              // Find the Status field and target option
              const statusField = projectData.node.fields.nodes.find(
                field => field.name === 'Status'
              );
              
              if (!statusField) {
                console.log('Status field not found in project');
                return;
              }
              
              const fieldId = statusFieldId || statusField.id;
              console.log(`Status field ID: ${fieldId}`);
              
              const statusOption = statusField.options.find(
                opt => opt.name.toLowerCase() === targetStatus.toLowerCase()
              );
              
              if (!statusOption) {
                console.log(`Status option "${targetStatus}" not found`);
                return;
              }
              
              console.log(`Status option ID: ${statusOption.id}`);
              
              // Update the project item
              const updateMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `;
              
              await github.graphql(updateMutation, {
                projectId: projectId,
                itemId: projectItem.id,
                fieldId: fieldId,
                optionId: statusOption.id
              });
              
              console.log(`✅ Successfully updated issue #${issueNumber} to status: ${targetStatus}`);
            } catch (error) {
              console.error('Error updating project status:', error);
              // Don't fail the workflow if project update fails
            }
